apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llamastack-postgres-pvc
  namespace: rhoai-project
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamastack-postgres
  namespace: rhoai-project
  labels:
    app: llamastack-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llamastack-postgres
  template:
    metadata:
      labels:
        app: llamastack-postgres
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: llamastack
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llamastack-postgres-secret
                  key: password
            - name: POSTGRESQL_DATABASE
              value: llamastack
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            exec:
              command:
                - /usr/libexec/check-container
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /usr/libexec/check-container
                - --live
            initialDelaySeconds: 120
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: llamastack-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: llamastack-postgres
  namespace: rhoai-project
  labels:
    app: llamastack-postgres
spec:
  selector:
    app: llamastack-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
