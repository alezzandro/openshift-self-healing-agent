apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: gpu-l4-nvidia
  namespace: redhat-ods-applications
  annotations:
    opendatahub.io/dashboard-feature-visibility: '["model-serving"]'
    opendatahub.io/description: "NVIDIA L4 GPU profile for LLM inference (1 GPU, 4 CPU, 16Gi RAM)"
    opendatahub.io/display-name: "NVIDIA L4 GPU - LLM Inference"
    opendatahub.io/disabled: "false"
    opendatahub.io/managed: "false"
spec:
  identifiers:
    - displayName: CPU
      identifier: cpu
      resourceType: CPU
      defaultCount: 4
      minCount: 2
      maxCount: 8
    - displayName: Memory
      identifier: memory
      resourceType: Memory
      defaultCount: 16Gi
      minCount: 8Gi
      maxCount: 32Gi
    - displayName: NVIDIA GPU
      identifier: nvidia.com/gpu
      resourceType: Accelerator
      defaultCount: 1
      minCount: 1
      maxCount: 1
  scheduling:
    type: Node
    node:
      nodeSelector:
        node-role.kubernetes.io/worker-gpu: ""
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
