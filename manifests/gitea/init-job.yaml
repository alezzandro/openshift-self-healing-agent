apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-init
  namespace: gitea
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: gitea-init
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              GITEA_URL="http://gitea.gitea.svc:3000"

              echo "Waiting for Gitea to be ready..."
              for i in $(seq 1 60); do
                if curl -sf "${GITEA_URL}/api/v1/version" >/dev/null 2>&1; then
                  echo "Gitea is ready."
                  break
                fi
                echo "Attempt $i/60 -- waiting..."
                sleep 5
              done

              echo "Creating admin user..."
              curl -sf -X POST "${GITEA_URL}/api/v1/admin/users" \
                -H "Content-Type: application/json" \
                -u "gitea_admin:${GITEA_ADMIN_PASSWORD}" \
                -d '{
                  "username": "gitea_admin",
                  "email": "admin@example.com",
                  "password": "'"${GITEA_ADMIN_PASSWORD}"'",
                  "must_change_password": false,
                  "login_name": "gitea_admin",
                  "source_id": 0
                }' 2>/dev/null || echo "Admin user may already exist"

              echo "Creating remediation-playbooks repository..."
              curl -sf -X POST "${GITEA_URL}/api/v1/user/repos" \
                -H "Content-Type: application/json" \
                -u "gitea_admin:${GITEA_ADMIN_PASSWORD}" \
                -d '{
                  "name": "remediation-playbooks",
                  "description": "AI-generated remediation playbooks for OpenShift self-healing",
                  "private": false,
                  "auto_init": true,
                  "default_branch": "main",
                  "readme": "Default"
                }' 2>/dev/null || echo "Repository may already exist"

              echo "Gitea initialization complete."
          env:
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-admin-credentials
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
