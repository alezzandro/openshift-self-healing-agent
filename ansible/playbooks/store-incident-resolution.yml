---
- name: Store incident resolution in knowledge base
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Set safe defaults for alert and resolution variables
      ansible.builtin.set_fact:
        alert_name: "{{ alert_name | default('Unknown') }}"
        alert_description: "{{ alert_description | default('') }}"
        diagnostics: "{{ diagnostics | default({}) }}"
        snow_incident_number: "{{ snow_incident_number | default('') }}"
        ai_response_text: "{{ ai_response_text | default('') }}"
        ai_response_status: "{{ ai_response_status | default('completed') }}"
        ai_extra_vars: "{{ ai_extra_vars | default({}) }}"

    - name: Build extra_vars schema from AI-derived vars
      ansible.builtin.set_fact:
        extra_vars_schema: >-
          {{ dict(ai_extra_vars | default({}) | dict2items
             | map(attribute='key')
             | zip(ai_extra_vars | default({}) | dict2items
                   | map(attribute='key')
                   | map('regex_replace', '.*', 'string'))
             | list) }}
      when: ai_extra_vars | default({}) | length > 0
      ignore_errors: true

    - name: Fall back to empty schema
      ansible.builtin.set_fact:
        extra_vars_schema: {}
      when: extra_vars_schema is not defined

    - name: Build resolution record
      ansible.builtin.set_fact:
        resolution_record:
          alert_name: "{{ alert_name }}"
          alert_description: "{{ alert_description }}"
          rca: "{{ ai_response_text }}"
          snow_incident: "{{ snow_incident_number }}"
          status: "{{ ai_response_status }}"
          job_template_name: "Remediate {{ alert_name }}"
          extra_vars_schema: "{{ extra_vars_schema }}"
          extra_vars_example: "{{ ai_extra_vars | default({}) }}"
          timestamp: "{{ lookup('pipe', 'date -Iseconds') }}"

    - name: Display resolution summary
      ansible.builtin.debug:
        msg: >-
          Resolution stored for alert '{{ alert_name }}'
          (incident {{ snow_incident_number }}).
          Status: {{ ai_response_status }}.
          AI response length: {{ ai_response_text | length }} chars.
          Extra vars schema: {{ extra_vars_schema }}.

    - name: Set stats for workflow completion
      ansible.builtin.set_stats:
        data:
          workflow_status: "completed"
          resolution_record: "{{ resolution_record }}"
        per_host: false
